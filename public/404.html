<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Single Page Apps for GitHub Pages</title>
    <script type="text/javascript">
      // This script handles deep links / direct access / refresh on sub-routes
      (function(l) {
        if (l.pathname === '/' || l.pathname === '/index.html') {
          // Root or explicit index → no redirect needed
          return;
        }

        // Strip leading / and any repeated /index.html
        var path = l.pathname.replace(/^\/+/, '').replace(/(\/index\.html)+/g, '');

        // Rebuild clean path (add query + hash if present)
        var clean = '/' + path + l.search + l.hash;

        // Redirect once to index.html with the clean path as "virtual" route
        l.replace('/index.html' + clean);
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
